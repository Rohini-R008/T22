<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans">
  <nav class="sticky top-0 z-50 bg-white shadow-md">
    <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
      <h1 class="font-bold text-lg">✦ Project</h1>
      <ul class="hidden md:flex gap-6 items-center">
        <li><a href="#" class="hover:underline">Product</a></li>
        <li><a href="#" class="hover:underline">Solutions</a></li>
        <li><a href="#" class="hover:underline">Resources</a></li>
        <li><a href="#" class="hover:underline">Pricing</a></li>
        <li><a href="#" class="hover:underline">Log in</a></li>
        <li>
          <button class="bg-black text-white px-4 py-2 rounded">
            Get AI free
          </button>
        </li>
      </ul>
    </div>
  </nav>
  <section class="bg-gradient-to-r from-orange-100 to-white text-center py-20 relative">

    <h1 class="text-4xl md:text-6xl font-bold leading-tight">
      Write, plan, share.<br>
      With AI at your side.
    </h1>

    <p class="mt-4 text-gray-600 max-w-xl mx-auto">
      It is the connected workspace where better, faster work happens. Now with AI.
    </p>
    <div class="mt-6 flex justify-center gap-4">
      <button class="bg-black text-white px-6 py-3 rounded">
        Get AI free →
      </button>
      <button class="bg-blue-600 text-white px-6 py-3 rounded">
        Request a demo
      </button>
    </div>
    <div class="relative mt-16 flex justify-center">
      <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71"
           class="w-[500px] rounded shadow-lg">
      <div class="absolute left-10 top-10 bg-white p-3 rounded shadow">
        📋 12 tasks completed today
      </div>
      <div class="absolute right-10 top-10 bg-white p-3 rounded shadow">
        ✔ On Track
      </div>
      <div class="absolute right-10 bottom-10 bg-white p-3 rounded shadow">
        👥 +5 online
      </div>

    </div>

  </section>
  <div class="fixed bottom-6 right-6 z-50">
    <button class="bg-black text-white p-4 rounded-full shadow-lg">
      💬
    </button>
  </div>

  <script src="script.js"></script>

</body>
</html>
